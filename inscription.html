<!DOCTYPE html>

   <style>
    form {
        border: thick black solid;
        background-color: rgb(251, 220, 255);
        min-width: 300px;
        max-width: 800px;
        display: flex;
        flex-wrap: wrap;
        width: 500px;
        height: 400px;
        align-items: center;
    }

    .field {
        flex-basis: 100%;
        display: flex;
    }

    label[for=commentaire], textarea {
        flex-basis: 80% ;
    }

    input {
        flex-grow: 1 ;
    }

    
header {
    background-color: #bf7cee; /*Couleur de l'entête*/
    color: #ffffff; /*Couleur du texte de l'entête*/
    font-weight: bold;
    width: 99%;
}

header div{
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav ul {
    display: flex;
    list-style: none; /*enlève les points dans la liste*/
}

nav a {
    color: #ffffff;
    text-decoration: none; /*enlève le soulignement*/
}


section { /*bloc*/
    background-color: white;
    margin: 20px 0;
    padding:20px;
    border-radius: 5px;
}


.bouton { /*bouton voir plus*/
    display: inline-block;
    margin-top: 10px;
    padding: 10px 15px;
    background-color: #6d18a8;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

.bouton:hover { /*change la couleur quand on passe la souris*/
    background-color: #ff0390;
}

.boxs {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.box {
    flex: 1; 
    min-width: 250px; /*taille minimum de la box*/
    background-color: #bf7cee; /*arrière plan de la box*/
    padding: 15px;
    border-radius: 5px;
}

footer {
    background-color: #bf7cee;
    color: white;
    padding: 15px;
    margin-top: 20px;

    margin: auto;

    display: flex;
    align-items: center;
    width: 99%;
}

footer  div {
    flex: 1;
}


.footer-left{
    text-align: left;
    line-height:1.5;
}


.footer-center {
    text-align: center;
    margin: 0;
}

.footer-right {
    text-align: right;
}

footer ul {
    list-style: none;
    padding: 0;
    margin: 0;
    line-height: 0.6;
}

footer a {
    text-decoration: none;
    color: #ffffff;
}
   </style>
